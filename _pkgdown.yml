# pkgdown site config for tidyILD
# Build with: pkgdown::build_site() from package root

url: https://alitovchenko.github.io/tidyILD

development:
  mode: auto

navbar:
  structure:
    left: [reference, articles, news]
    right: [github]

# Order: conceptual KFAS vignette first, then spacing, then backend choice; then other articles.
articles:
  - title: KFAS (state space)
    desc: >
      Read **State-space modeling** first; then irregular timing; then choosing a backend.
    contents:
      - kfas-state-space-modeling
      - kfas-irregular-timing-spacing
      - kfas-choosing-backend
      - ctsem-continuous-time-dynamics
  - title: Workflows and reports
    desc: >
      Start with **tidyILD-workflow**; **visualization-in-tidyILD** indexes plots and bundle sections; **temporal-dynamics-model-choice** maps questions to lags, AR, TVEM, and state-space; **benchmark-simulation-recovery** shows recovery/power under the bundled simulation DGP.
    contents:
      - tidyILD-workflow
      - visualization-in-tidyILD
      - temporal-dynamics-model-choice
      - brms-dynamics-recipes
      - benchmark-simulation-recovery
      - ild-analysis-report
      - ild-provenance
      - ild-decomposition-and-spacing
      - tsibble-interoperability
      - heterogeneity-interpretation
      - ild-missingness-workflow
      - ild-glossary-and-quickstart
      - developer-contracts

reference:
  - title: Setup and validation
    contents: [ild_prepare, as_ild, is_ild, validate_ild, ild_meta]
  - title: Summaries and inspection
    contents: [ild_summary, ild_spacing_class, ild_spacing, ild_design_check]
  - title: Visualization
    contents:
      - ild_plot
      - ild_spaghetti
      - ild_heatmap
      - ild_plot_predicted_trajectory
      - ild_center_plot
      - ild_circadian
      - ild_plot_states
      - ild_plot_forecast
      - ild_plot_filtered_vs_smoothed
      - ild_acf
      - ild_diagnostics
      - plot_ild_diagnostics
      - ild_autoplot
  - title: Within-person and lags
    contents: [ild_center, ild_decomposition, ild_lag, ild_check_lags, ild_panel_lag_prepare, ild_crosslag, ild_align]
  - title: Modeling
    contents: [ild_fit, ild_lme, ild_brms, ild_kfas, ild_ctsem, ild_person_model, ild_person_distribution, ild_heterogeneity, ild_heterogeneity_stratified, ild_tvem, ild_tvem_plot]
  - title: Robust SE and missingness
    contents:
      - ild_robust_se
      - ild_missing_pattern
      - ild_missing_compliance
      - ild_missing_cohort
      - ild_missing_hazard_first
      - ild_missingness_report
