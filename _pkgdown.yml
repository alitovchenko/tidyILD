# pkgdown site config for tidyILD
# Build with: pkgdown::build_site() from package root

url: https://alitovchenko.github.io/tidyILD

development:
  mode: auto

navbar:
  structure:
    left: [reference, articles, news]
    right: [github]

# Order: conceptual KFAS vignette first, then spacing, then backend choice; then other articles.
articles:
  - title: KFAS (state space)
    desc: >
      Read **State-space modeling** first; then irregular timing; then choosing a backend.
    contents:
      - kfas-state-space-modeling
      - kfas-irregular-timing-spacing
      - kfas-choosing-backend
      - ctsem-continuous-time-dynamics
  - title: Workflows and reports
    desc: >
      Start with **tidyILD-workflow**; **benchmark-simulation-recovery** shows recovery/power under the bundled simulation DGP.
    contents:
      - tidyILD-workflow
      - benchmark-simulation-recovery
      - ild-analysis-report
      - ild-provenance
      - ild-decomposition-and-spacing
      - tsibble-interoperability
      - ild-glossary-and-quickstart
      - developer-contracts

reference:
  - title: Setup and validation
    contents: [ild_prepare, as_ild, is_ild, validate_ild, ild_meta]
  - title: Summaries and inspection
    contents: [ild_summary, ild_spacing_class, ild_spacing, ild_design_check, ild_missing_pattern, ild_missing_bias, ild_plot]
  - title: Within-person and lags
    contents: [ild_center, ild_center_plot, ild_decomposition, ild_lag, ild_check_lags, ild_crosslag, ild_align]
  - title: Modeling
    contents: [ild_fit, ild_lme, ild_brms, ild_kfas, ild_ctsem, ild_person_model, ild_person_distribution, ild_tvem, ild_tvem_plot]
  - title: Robust SE and missingness
    contents: [ild_robust_se, ild_missing_model, ild_ipw_weights, ild_ipw_refit]
  - title: Diagnostics and visualization
    contents: [ild_acf, ild_diagnostics, plot_ild_diagnostics, ild_heatmap, ild_spaghetti, ild_circadian]
  - title: Model tidiers
    contents: [augment_ild_model, tidy_ild_model, broom_ild_lme]
  - title: Reproducibility
    contents: [ild_manifest, ild_bundle]
  - title: Utilities and data
    contents: [ild_simulate, ild_power, ild_recovery_metrics, ema_example]
